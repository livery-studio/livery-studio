<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Livery Studio</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="home">

<div class="header">

    <h1>Livery Studio</h1>

    <p>Create professional airline liveries.</p>

</div>

<div class="aircraftGrid">

    <div class="card" data-template="atr72-500">
        <img src="templates/atr72-500.png">
        <h3>ATR 72-500</h3>
    </div>

    <div class="card" data-template="a220-300">
        <img src="templates/a220-300.png">
        <h3>Airbus A220-300</h3>
    </div>

    <div class="card" data-template="a320neo">
        <img src="templates/a320neo.png">
        <h3>Airbus A320neo</h3>
    </div>

    <div class="card" data-template="a321neo">
        <img src="templates/a321neo.png">
        <h3>Airbus A321neo</h3>
    </div>

    <div class="card" data-template="b737max8">
        <img src="templates/b737max8.png">
        <h3>Boeing 737 MAX 8</h3>
    </div>

    <div class="card" data-template="b787-9">
        <img src="templates/b787-9.png">
        <h3>Boeing 787-9</h3>
    </div>

</div>

<script>

document.querySelectorAll(".card").forEach(card=>{

card.onclick=()=>{

localStorage.setItem("template",card.dataset.template);

location.href="editor.html";

};

});

</script>

</body>

</html>
